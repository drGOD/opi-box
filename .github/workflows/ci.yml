name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install linter
        run: pip install flake8

      - name: flake8
        run: |
          flake8 . \
            --max-line-length=100 \
            --exclude=venv,.venv,timelapse,__pycache__ \
            --ignore=E501,W503,E241

  imports:
    name: Check imports
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install runtime deps (no GPIO/OpenCV)
        run: pip install flask requests

      - name: Verify modules load
        run: |
          python -c "
          import sys, types

          for mod in ('cv2', 'gpiod'):
              sys.modules[mod] = types.ModuleType(mod)

          import config
          import relay
          print('All imports OK')
          "

  tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install runtime deps
        run: pip install -r requirements.txt

      - name: Install coverage
        run: pip install coverage

      - name: Run unit tests
        run: coverage run -m unittest discover -s tests -v

      - name: Report coverage
        run: coverage report -m
